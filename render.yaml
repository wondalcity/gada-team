services:
  - type: web
    name: gada-api
    runtime: docker
    plan: free
    dockerfilePath: Dockerfile.api
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8090"
      # DB (Supabase)
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FLYWAY_DB_URL
        sync: false
      # Redis (Upstash 무료)
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      # Firebase
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # Toss Payments
      - key: TOSS_SECRET_KEY
        sync: false
