version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gada-hiring-postgres
    environment:
      POSTGRES_DB: gada_hiring
      POSTGRES_USER: gada
      POSTGRES_PASSWORD: gada_dev_pass
    ports:
      - "5436:5432"     # 5436 to avoid conflicts with other local PG instances
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gada -d gada_hiring"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gada-hiring-redis
    ports:
      - "6380:6379"     # 6380 to avoid conflicts
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: gada-team-web
    environment:
      INTERNAL_API_URL: http://host.docker.internal:8090/api
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBFbzuM0uap-20aOKCqr6l_uEUay7tkajs
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: gada-team.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: gada-team
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: gada-team.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "611396731956"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:611396731956:web:01af2b98d5f4a6359cf661
    ports:
      - "3020:3020"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: gada-team-admin
    environment:
      INTERNAL_API_URL: http://host.docker.internal:8090
    ports:
      - "5002:5002"
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/admin/node_modules
      - /app/apps/admin/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  redis_data:
