version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gada-hiring-postgres
    environment:
      POSTGRES_DB: gada_hiring
      POSTGRES_USER: gada
      POSTGRES_PASSWORD: gada_dev_pass
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gada -d gada_hiring"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gada-hiring-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: gada-team-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8090"
      # DB — local postgres container
      DB_URL: jdbc:postgresql://postgres:5432/gada_hiring
      DB_USERNAME: gada
      DB_PASSWORD: gada_dev_pass
      DB_POOL_SIZE: "5"
      FLYWAY_DB_URL: jdbc:postgresql://postgres:5432/gada_hiring
      # Redis — local redis container
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      # Firebase
      FIREBASE_PROJECT_ID: gada-team
      # Firebase — set FIREBASE_SERVICE_ACCOUNT_JSON in .env or environment before running docker-compose
      FIREBASE_SERVICE_ACCOUNT_JSON: '${FIREBASE_SERVICE_ACCOUNT_JSON:-}'
      # Toss (test key)
      TOSS_SECRET_KEY: test_sk_zXLkKEypNArWmo50nX3lmeaxYG5R
    ports:
      - "8090:10000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: gada-team-web
    depends_on:
      - api
    environment:
      INTERNAL_API_URL: http://api:10000/api
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBFbzuM0uap-20aOKCqr6l_uEUay7tkajs
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: gada-team.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: gada-team
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: gada-team.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "611396731996"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:611396731956:web:01af2b98d5f4a6359cf661
      NEXT_PUBLIC_TOSS_CLIENT_KEY: test_ck_D5GePWvyJnrK0W0k6q8gLzN97Ead
    ports:
      - "4000:4000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: gada-team-admin
    depends_on:
      - api
    environment:
      INTERNAL_API_URL: http://api:10000
    ports:
      - "4001:4001"
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/admin/node_modules
      - /app/apps/admin/.next

volumes:
  postgres_data:
  redis_data:
