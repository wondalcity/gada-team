# Local development overrides
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gada_hiring
    username: gada
    password: gada_dev_pass

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration

  cache:
    type: simple

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

server:
  port: 8090

logging:
  level:
    com.gada: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# SMS provider (mock for local dev)
sms:
  provider: mock

# Firebase — use gada-team project for local dev
firebase:
  project-id: gada-team
  service-account-path: src/main/resources/firebase-service-account.json

management:
  health:
    redis:
      enabled: false

# Dev auth bypass (only active in local profile)
dev:
  auth:
    bypass: true
    header: X-Dev-User-Id
