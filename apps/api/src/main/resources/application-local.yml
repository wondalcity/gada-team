# Local development overrides
spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/gada_hiring
    username: gada
    password: gada_dev_pass

  data:
    redis:
      host: localhost
      port: 6380

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

server:
  port: 8090

logging:
  level:
    com.gada: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# SMS provider (mock for local dev)
sms:
  provider: mock

# Firebase (empty creds = dev mode, auth disabled in dev filter)
firebase:
  project-id: gada-hiring-local

# Dev auth bypass (only active in local profile)
dev:
  auth:
    bypass: true
    header: X-Dev-User-Id
