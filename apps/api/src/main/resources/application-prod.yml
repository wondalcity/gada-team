# Production profile — Railway + Supabase
spring:
  datasource:
    # Supabase Transaction Pooler (port 6543) for short-lived connections
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: GadaProdPool
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
      # Required for Supabase (sets schema search path on each connection)
      connection-init-sql: SET search_path TO public
      # With lazy-initialization=true, first request triggers pool init.
      # Default 1ms causes immediate fail for remote Supabase (~150ms RTT).
      # 60000ms = wait up to 60s for the initial pool connection.
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    # Use Supabase direct connection (not pooler) for migrations
    url: ${FLYWAY_DB_URL:${DB_URL}}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 1

  cache:
    type: redis

server:
  port: ${SERVER_PORT:8090}
  compression:
    enabled: true
  error:
    include-message: always

firebase:
  project-id: ${FIREBASE_PROJECT_ID}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON}

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY}

logging:
  level:
    com.gada: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# Dev bypass disabled in production
dev:
  auth:
    bypass: false
