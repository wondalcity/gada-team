name: Deploy API to Render

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "Dockerfile.api"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP %{http_code}"
